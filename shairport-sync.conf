// Sample configuration file for Shairport Sync
// For Snapcast integration - outputs to pipe

general = {
    name = "Wintermute";
    output_backend = "pipe";
    volume_range_db = 60;
    drift_tolerance_in_seconds = 0.005;
    disable_resynchronization = false;
    interpolation = "basic";
    resync_threshold_in_seconds = 0.050;
};

// Pipe backend configuration (for Snapcast)
pipe = {
    name = "/tmp/shairport-sync-pipe";
    audio_format = "S16";
};

// Metadata configuration (for track info display)
metadata = {
    enabled = "yes";
    include_cover_art = "yes";
    pipe_name = "/tmp/shairport-sync-metadata";
    socket_address = "/tmp/shairport-sync-metadata-socket";
};