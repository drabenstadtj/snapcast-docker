services:
  snapcast:
    build: .
    image: ghcr.io/drabenstadtj/snapcast-docker:latest
    container_name: snapcast
    hostname: snapcast
    network_mode: host
    cap_add:
      - SYS_NICE  # required by nqptp for real-time audio timing (AirPlay 2)
    environment:
      - PUID=1000
      - PGID=1000 # set to audio group ID
      - TZ=America/New_York
      - START_SNAPCLIENT=false
      - START_AIRPLAY=true #set to 'true' to enable Airplay support via Shairport-sync
      # Optional: set AVAHI_INTERFACE to your LAN interface name (e.g. eth0, ens3, bond0).
      # If unset, the interface is auto-detected from the default route.
      # Required if auto-detection picks the wrong interface.
      #- AVAHI_INTERFACE=eth0
    restart: unless-stopped
    volumes:
      - /opt/data/config/snapcast:/config/
      - ./data/:/data/
      - ./audio-fifos/:/audio/
      - /opt/data/config/snapcast/cache:/var/cache/librespot
      - /tmp/snapcast:/tmp/   